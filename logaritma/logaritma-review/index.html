<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan Logaritma Adaptif</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"
    ></script>

    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f4f7f6;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .quiz-container {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
        text-align: center;
        position: relative;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #2c3e50;
      }
      .score-bar {
        display: flex;
        justify-content: space-around;
        margin-bottom: 15px;
        font-size: 1rem;
        background: #e8f4f8;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #bce8f1;
        font-weight: bold;
      }
      .status-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        font-size: 0.9rem;
        background: #eef2f5;
        padding: 10px;
        border-radius: 8px;
      }
      .question-box {
        font-size: 1.5rem;
        margin: 30px 0;
        min-height: 60px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      button.option-btn {
        background-color: #3498db;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s;
      }
      button.option-btn:hover {
        background-color: #2980b9;
      }
      button.option-btn:disabled {
        background-color: #95a5a6;
        cursor: not-allowed;
      }
      .feedback {
        margin-top: 20px;
        font-weight: bold;
        min-height: 24px;
      }
      .correct {
        color: #27ae60;
      }
      .incorrect {
        color: #e74c3c;
      }
      .text-correct {
        color: #27ae60;
      }
      .text-incorrect {
        color: #e74c3c;
      }
      .level-up {
        color: #2980b9;
        font-size: 1.1rem;
        margin-top: 10px;
      }

      .reset-btn {
        background-color: #e74c3c;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 0.9rem;
        cursor: pointer;
        margin-top: 25px;
        transition: background 0.3s;
      }
      .reset-btn:hover {
        background-color: #c0392b;
      }
    </style>
  </head>
  <body>
    <div class="quiz-container">
      <h1>Latihan Logaritma Adaptif</h1>

      <div class="score-bar">
        <div>Total Soal: <span id="total-q">0</span></div>
        <div class="text-correct">Benar: <span id="total-correct">0</span></div>
        <div class="text-incorrect">Salah: <span id="total-wrong">0</span></div>
      </div>

      <div class="status-bar">
        <div>Level: <strong id="level-display">1</strong>/4</div>
        <div class="text-correct">
          Benar: <strong id="streak-correct">0</strong>/3
        </div>
        <div class="text-incorrect">
          Salah: <strong id="streak-wrong">0</strong>/2
        </div>
      </div>

      <div id="question-container" class="question-box"></div>

      <div class="options" id="options-container"></div>

      <div id="feedback" class="feedback"></div>
      <div id="level-notification" class="level-up"></div>

      <button class="reset-btn" onclick="resetProgress()">
        🔄 Reset Progres
      </button>
    </div>

    <script>
      // Data Soal (Level 1 sampai 4)
      const levels = [
        // LEVEL 1: Definisi Dasar
        [
          { q: "\\log_2 8", options: ["2", "3", "4", "8"], a: "3" },
          { q: "\\log_3 27", options: ["3", "9", "27", "4"], a: "3" },
          { q: "\\log_5 25", options: ["2", "5", "10", "3"], a: "2" },
          { q: "\\log_{10} 100", options: ["10", "2", "1", "100"], a: "2" },
          { q: "\\log_2 16", options: ["8", "4", "3", "2"], a: "4" },
          { q: "\\log_4 16", options: ["4", "2", "8", "1"], a: "2" },
          { q: "\\log_7 49", options: ["2", "7", "14", "3"], a: "2" },
          { q: "\\log_2 2", options: ["2", "0", "1", "-1"], a: "1" },
          { q: "\\log_3 1", options: ["3", "1", "0", "-1"], a: "0" },
          { q: "\\log_{10} 1000", options: ["2", "3", "10", "100"], a: "3" },
        ],
        // LEVEL 2: Sifat Penjumlahan & Pengurangan Sederhana
        [
          { q: "\\log_2 4 + \\log_2 2", options: ["2", "3", "4", "6"], a: "3" },
          {
            q: "\\log_6 12 + \\log_6 3",
            options: ["2", "3", "6", "36"],
            a: "2",
          },
          {
            q: "\\log_2 16 - \\log_2 2",
            options: ["2", "3", "4", "8"],
            a: "3",
          },
          {
            q: "\\log_3 27 - \\log_3 9",
            options: ["1", "2", "3", "9"],
            a: "1",
          },
          {
            q: "\\log_{10} 5 + \\log_{10} 2",
            options: ["1", "2", "7", "10"],
            a: "1",
          },
          {
            q: "\\log_{10} 200 - \\log_{10} 2",
            options: ["2", "100", "4", "10"],
            a: "2",
          },
          {
            q: "\\log_2 8 + \\log_2 4",
            options: ["3", "4", "5", "12"],
            a: "5",
          },
          {
            q: "\\log_5 50 - \\log_5 2",
            options: ["2", "3", "5", "25"],
            a: "2",
          },
          {
            q: "\\log_3 18 - \\log_3 2",
            options: ["2", "3", "6", "9"],
            a: "2",
          },
          {
            q: "\\log_4 8 + \\log_4 2",
            options: ["2", "4", "6", "16"],
            a: "2",
          },
        ],
        // LEVEL 3: Sifat Pangkat & Persamaan Sederhana
        [
          { q: "2 \\log_3 3", options: ["1", "2", "3", "6"], a: "2" },
          { q: "\\log_2 (2^5)", options: ["2", "5", "10", "32"], a: "5" },
          {
            q: "\\frac{1}{2} \\log_2 16",
            options: ["2", "4", "8", "1"],
            a: "2",
          },
          { q: "3 \\log_5 25", options: ["2", "3", "5", "6"], a: "6" },
          {
            q: "\\log_x 9 = 2 \\text{, } x = ?",
            options: ["2", "3", "4", "9"],
            a: "3",
          },
          {
            q: "\\log_2 x = 4 \\text{, } x = ?",
            options: ["8", "16", "2", "4"],
            a: "16",
          },
          {
            q: "\\log_3 (x+1) = 2 \\text{, } x = ?",
            options: ["8", "9", "2", "7"],
            a: "8",
          },
          {
            q: "\\log_x 16 = 2 \\text{, } x = ?",
            options: ["2", "4", "8", "16"],
            a: "4",
          },
          {
            q: "2 \\log_2 4 + 3 \\log_2 2",
            options: ["5", "7", "10", "14"],
            a: "7",
          },
          {
            q: "\\log_5 x = 3 \\text{, } x = ?",
            options: ["15", "25", "125", "5"],
            a: "125",
          },
        ],
        // LEVEL 4: Manipulasi Lanjut
        [
          {
            q: "\\log_2 24 - \\log_2 3",
            options: ["2", "3", "4", "8"],
            a: "3",
          },
          {
            q: "\\log_3 54 - \\log_3 2",
            options: ["2", "3", "6", "9"],
            a: "3",
          },
          {
            q: "\\log_5 100 - \\log_5 4",
            options: ["2", "5", "10", "25"],
            a: "2",
          },
          {
            q: "2 \\log_2 6 - \\log_2 9",
            options: ["2", "3", "4", "9"],
            a: "2",
          },
          {
            q: "\\log_{10} 25 + \\log_{10} 4",
            options: ["2", "10", "29", "100"],
            a: "2",
          },
          {
            q: "\\log_2 5 \\cdot \\log_5 8",
            options: ["2", "3", "5", "8"],
            a: "3",
          },
          {
            q: "\\log_3 7 \\cdot \\log_7 9",
            options: ["2", "3", "7", "9"],
            a: "2",
          },
          {
            q: "\\log_2 12 - \\log_2 3 + \\log_2 4",
            options: ["2", "3", "4", "16"],
            a: "4",
          },
          {
            q: "\\log_6 9 + \\log_6 4",
            options: ["2", "3", "6", "36"],
            a: "2",
          },
          { q: "\\log_2 \\sqrt{8}", options: ["1", "3/2", "2", "3"], a: "3/2" },
          {
            q: "\\log_3 \\frac{1}{27}",
            options: ["-3", "-1", "3", "9"],
            a: "-3",
          },
          {
            q: "2 \\log_{10} 5 + \\log_{10} 4",
            options: ["1", "2", "10", "100"],
            a: "2",
          },
          {
            q: "\\log_4 64 - \\log_4 16",
            options: ["1", "2", "3", "4"],
            a: "1",
          },
          {
            q: "\\log_2 x + \\log_2 3 = \\log_2 15 \\text{, } x = ?",
            options: ["3", "5", "12", "45"],
            a: "5",
          },
          {
            q: "\\log_3 x - \\log_3 2 = 2 \\text{, } x = ?",
            options: ["8", "11", "18", "36"],
            a: "18",
          },
          {
            q: "\\log_5 (5\\sqrt{5})",
            options: ["1", "3/2", "2", "5/2"],
            a: "3/2",
          },
          { q: "4 \\log_2 \\sqrt{2}", options: ["1", "2", "4", "8"], a: "2" },
          {
            q: "\\log_2 10 - \\log_2 5",
            options: ["1", "2", "5", "10"],
            a: "1",
          },
          {
            q: "\\log_x 8 \\cdot \\log_2 x",
            options: ["2", "3", "4", "8"],
            a: "3",
          },
          {
            q: "\\frac{1}{3} \\log_2 64",
            options: ["2", "3", "4", "8"],
            a: "2",
          },
        ],
      ];

      // Variabel Default
      let currentLevel = 0;
      let streakCorrect = 0;
      let streakWrong = 0;
      let totalQuestions = 0;
      let totalCorrect = 0;
      let totalWrong = 0;
      let usedQuestions = [[], [], [], []]; // Menyimpan string pertanyaan yang sudah dipakai
      let currentQ = null;

      // Load data dari LocalStorage saat halaman dibuka
      function loadProgress() {
        const savedData = localStorage.getItem("logQuizData");
        if (savedData) {
          const data = JSON.parse(savedData);
          currentLevel = data.currentLevel || 0;
          streakCorrect = data.streakCorrect || 0;
          streakWrong = data.streakWrong || 0;
          totalQuestions = data.totalQuestions || 0;
          totalCorrect = data.totalCorrect || 0;
          totalWrong = data.totalWrong || 0;
          usedQuestions = data.usedQuestions || [[], [], [], []];
        }
      }

      // Save data ke LocalStorage
      function saveProgress() {
        const data = {
          currentLevel,
          streakCorrect,
          streakWrong,
          totalQuestions,
          totalCorrect,
          totalWrong,
          usedQuestions,
        };
        localStorage.setItem("logQuizData", JSON.stringify(data));
      }

      // Reset progres manual
      function resetProgress() {
        if (
          confirm("Apakah Anda yakin ingin mereset semua progres kembali ke 0?")
        ) {
          localStorage.removeItem("logQuizData");
          location.reload(); // Muat ulang halaman
        }
      }

      function getRandomQuestion() {
        let pool = levels[currentLevel];
        let used = usedQuestions[currentLevel];

        // Jika semua soal di level ini sudah dipakai, reset daftar yang dipakai
        if (used.length >= pool.length) {
          usedQuestions[currentLevel] = [];
          used = usedQuestions[currentLevel];
        }

        let available = pool.filter((qObj) => !used.includes(qObj.q));
        let randomIndex = Math.floor(Math.random() * available.length);
        let selected = available[randomIndex];

        used.push(selected.q); // Simpan pertanyaan sebagai tanda sudah dipakai
        return selected;
      }

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function renderQuestion() {
        currentQ = getRandomQuestion();

        const qContainer = document.getElementById("question-container");
        katex.render(currentQ.q, qContainer, {
          throwOnError: false,
          displayMode: true,
        });

        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        let shuffledOptions = shuffleArray([...currentQ.options]);

        shuffledOptions.forEach((opt) => {
          const btn = document.createElement("button");
          btn.className = "option-btn";
          btn.innerText = opt;
          btn.onclick = () => checkAnswer(opt, btn);
          optionsContainer.appendChild(btn);
        });

        document.getElementById("feedback").innerText = "";
        document.getElementById("level-notification").innerText = "";
        updateUI();
        saveProgress(); // Simpan state terbaru setiap kali soal di-render
      }

      function updateUI() {
        document.getElementById("level-display").innerText = currentLevel + 1;
        document.getElementById("streak-correct").innerText = streakCorrect;
        document.getElementById("streak-wrong").innerText = streakWrong;
        document.getElementById("total-q").innerText = totalQuestions;
        document.getElementById("total-correct").innerText = totalCorrect;
        document.getElementById("total-wrong").innerText = totalWrong;
      }

      function checkAnswer(selected, btnElement) {
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach((b) => (b.disabled = true));

        const feedback = document.getElementById("feedback");
        const levelNotif = document.getElementById("level-notification");

        totalQuestions++;

        if (selected === currentQ.a) {
          totalCorrect++;
          feedback.innerText = "Benar!";
          feedback.className = "feedback correct";
          streakCorrect++;
          streakWrong = 0;

          if (streakCorrect >= 3) {
            if (currentLevel < 3) {
              currentLevel++;
              levelNotif.innerText =
                "🎉 Luar biasa! Anda naik ke Level " + (currentLevel + 1);
            } else {
              levelNotif.innerText =
                "🏆 Anda sangat mahir! Bertahan di Level Tertinggi (Level 4).";
            }
            streakCorrect = 0;
          }
        } else {
          totalWrong++;
          feedback.innerText = "Salah. Jawaban yang benar: " + currentQ.a;
          feedback.className = "feedback incorrect";
          streakWrong++;
          streakCorrect = 0;

          if (streakWrong >= 2) {
            if (currentLevel > 0) {
              currentLevel--;
              levelNotif.innerText =
                "📉 Coba pelajari lagi. Turun ke Level " + (currentLevel + 1);
            }
            streakWrong = 0;
          }
        }

        updateUI();
        saveProgress(); // Simpan progres segera setelah menjawab

        // Jeda sebentar sebelum lanjut soal berikutnya
        setTimeout(() => {
          renderQuestion();
        }, 2200);
      }

      // Inisialisasi saat aplikasi pertama kali dimuat
      window.onload = () => {
        loadProgress();
        renderQuestion();
      };
    </script>
  </body>
</html>
