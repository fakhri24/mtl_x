<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan Logaritma Adaptif - Firebase Auth</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"
    ></script>

    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f4f7f6;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .container {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #2c3e50;
      }

      /* --- CSS UNTUK LOGIN --- */
      .login-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .login-form input {
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 1rem;
      }
      .login-form button {
        background: #27ae60;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
      }
      .login-form button:hover {
        background: #2ecc71;
      }
      /* ----------------------- */

      .score-bar {
        display: flex;
        justify-content: space-around;
        margin-bottom: 15px;
        font-size: 1rem;
        background: #e8f4f8;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #bce8f1;
        font-weight: bold;
      }
      .status-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        font-size: 0.9rem;
        background: #eef2f5;
        padding: 10px;
        border-radius: 8px;
      }
      .question-box {
        font-size: 1.5rem;
        margin: 30px 0;
        min-height: 60px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      button.option-btn {
        background-color: #3498db;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s;
      }
      button.option-btn:hover {
        background-color: #2980b9;
      }
      button.option-btn:disabled {
        background-color: #95a5a6;
        cursor: not-allowed;
      }

      .feedback {
        margin-top: 20px;
        font-weight: bold;
        min-height: 24px;
      }
      .correct {
        color: #27ae60;
      }
      .incorrect {
        color: #e74c3c;
      }
      .text-correct {
        color: #27ae60;
      }
      .text-incorrect {
        color: #e74c3c;
      }
      .level-up {
        color: #2980b9;
        font-size: 1.1rem;
        margin-top: 10px;
      }

      .bottom-actions {
        display: flex;
        justify-content: space-between;
        margin-top: 25px;
      }
      .reset-btn {
        background-color: #e74c3c;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 0.9rem;
        cursor: pointer;
      }
      .logout-btn {
        background-color: #7f8c8d;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 0.9rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="login-section" class="container" style="display: none">
      <h1>Masuk ke Latihan</h1>
      <div class="login-form">
        <input type="text" id="nisInput" placeholder="Masukkan NIS" />
        <input type="password" id="passwordInput" placeholder="Password" />
        <button onclick="loginSiswa()">Mulai Mengerjakan</button>
      </div>
    </div>

    <div id="quiz-section" class="container" style="display: none">
      <h1>Latihan Logaritma Adaptif</h1>

      <div class="score-bar">
        <div>Total Soal: <span id="total-q">0</span></div>
        <div class="text-correct">Benar: <span id="total-correct">0</span></div>
        <div class="text-incorrect">Salah: <span id="total-wrong">0</span></div>
      </div>

      <div class="status-bar">
        <div>Level: <strong id="level-display">1</strong>/4</div>
        <div class="text-correct">
          Benar: <strong id="streak-correct">0</strong>/3
        </div>
        <div class="text-incorrect">
          Salah: <strong id="streak-wrong">0</strong>/2
        </div>
      </div>

      <div id="question-container" class="question-box"></div>
      <div class="options" id="options-container"></div>

      <div id="feedback" class="feedback"></div>
      <div id="level-notification" class="level-up"></div>

      <div class="bottom-actions">
        <button class="reset-btn" onclick="resetProgress()">
          🔄 Reset Progres
        </button>
        <button class="logout-btn" onclick="logoutSiswa()">🚪 Keluar</button>
      </div>
    </div>

    <script type="module">
      // 1. IMPORT FIREBASE DARI CDN
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        signOut,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

      // --- PERHATIAN: PASTE CONFIG FIREBASE ANDA DI SINI NANTI ---
      const firebaseConfig = {
        apiKey: "AIzaSyC17E97fKxIzGZWgPjN1Aaq24eVYBtNJmc",
        authDomain: "review-logaritma.firebaseapp.com",
        projectId: "review-logaritma",
        storageBucket: "review-logaritma.firebasestorage.app",
        messagingSenderId: "1027244428914",
        appId: "1:1027244428914:web:a3ab81353df078ce173ceb",
        measurementId: "G-N0QQSWXNVW",
      };

      // Inisialisasi Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // Variabel Sesi Siswa
      let currentUID = null;

      // Data Soal (Level 1 sampai 4) - SAMA SEPERTI SEBELUMNYA
      const levels = [
        [
          { q: "\\log_2 8", options: ["2", "3", "4", "8"], a: "3" },
          { q: "\\log_3 27", options: ["3", "9", "27", "4"], a: "3" },
          { q: "\\log_5 25", options: ["2", "5", "10", "3"], a: "2" },
        ],
        [
          { q: "\\log_2 4 + \\log_2 2", options: ["2", "3", "4", "6"], a: "3" },
          {
            q: "\\log_6 12 + \\log_6 3",
            options: ["2", "3", "6", "36"],
            a: "2",
          },
        ],
        [
          { q: "2 \\log_3 3", options: ["1", "2", "3", "6"], a: "2" },
          { q: "\\log_2 (2^5)", options: ["2", "5", "10", "32"], a: "5" },
        ],
        [
          {
            q: "\\log_2 24 - \\log_2 3",
            options: ["2", "3", "4", "8"],
            a: "3",
          },
          {
            q: "\\log_3 54 - \\log_3 2",
            options: ["2", "3", "6", "9"],
            a: "3",
          },
        ],
      ]; // CATATAN: Saya memotong array soal agar kode di sini tidak terlalu panjang, Anda bisa memakai array soal lengkap Anda.

      let currentLevel = 0;
      let streakCorrect = 0;
      let streakWrong = 0;
      let totalQuestions = 0;
      let totalCorrect = 0;
      let totalWrong = 0;
      let usedQuestions = [[], [], [], []];
      let currentQ = null;

      // --------------------------------------------------------
      // LOGIKA AUTENTIKASI (LOGIN & LOGOUT)
      // --------------------------------------------------------

      // Fungsi untuk mengontrol perpindahan layar
      function showScreen(isLoggedIn) {
        document.getElementById("login-section").style.display = isLoggedIn
          ? "none"
          : "block";
        document.getElementById("quiz-section").style.display = isLoggedIn
          ? "block"
          : "none";
      }

      // Memantau apakah siswa sudah login atau belum
      onAuthStateChanged(auth, (user) => {
        if (user) {
          currentUID = user.uid;
          showScreen(true);
          loadProgress(); // Tarik data dari Firestore setelah login
        } else {
          currentUID = null;
          showScreen(false);
        }
      });

      window.loginSiswa = () => {
        const nis = document.getElementById("nisInput").value;
        const password = document.getElementById("passwordInput").value;
        if (!nis || !password) return alert("Isi NIS dan Password!");

        // TRIK: Gabungkan NIS menjadi email palsu
        const dummyEmail = nis + "@mtl.edu";

        signInWithEmailAndPassword(auth, dummyEmail, password)
          .then(() => {
            console.log("Login Sukses");
          })
          .catch((error) => {
            alert("NIS atau Password salah!");
            console.error(error);
          });
      };

      window.logoutSiswa = () => {
        signOut(auth).then(() => {
          // Bersihkan layar saat logout
          document.getElementById("question-container").innerHTML = "";
          document.getElementById("options-container").innerHTML = "";
        });
      };

      // --------------------------------------------------------
      // LOGIKA FIRESTORE (PENGGANTI LOCAL STORAGE)
      // --------------------------------------------------------

      async function loadProgress() {
        if (!currentUID) return;

        try {
          const docRef = doc(db, "progres_logaritma", currentUID);
          const docSnap = await getDoc(docRef);

          if (docSnap.exists()) {
            const data = docSnap.data();
            currentLevel = data.currentLevel || 0;
            streakCorrect = data.streakCorrect || 0;
            streakWrong = data.streakWrong || 0;
            totalQuestions = data.totalQuestions || 0;
            totalCorrect = data.totalCorrect || 0;
            totalWrong = data.totalWrong || 0;
            if (data.usedQuestions) {
              usedQuestions = JSON.parse(data.usedQuestions);
            } else {
              usedQuestions = [[], [], [], []];
            }
          } else {
            // Jika siswa baru pertama kali login, reset variabel ke 0
            currentLevel = 0;
            streakCorrect = 0;
            streakWrong = 0;
            totalQuestions = 0;
            totalCorrect = 0;
            totalWrong = 0;
            usedQuestions = [[], [], [], []];
          }

          updateUI();
          renderQuestion(); // Tampilkan soal SETELAH data dimuat
        } catch (error) {
          console.error("Gagal mengambil data progres: ", error);
        }
      }

      async function saveProgress() {
        if (!currentUID) return;

        const dataToSave = {
          currentLevel: currentLevel,
          streakCorrect: streakCorrect,
          streakWrong: streakWrong,
          totalQuestions: totalQuestions,
          totalCorrect: totalCorrect,
          totalWrong: totalWrong,
          // UBAH BARIS DI BAWAH INI:
          usedQuestions: JSON.stringify(usedQuestions),
          terakhirMengerjakan: new Date(),
        };

        try {
          await setDoc(doc(db, "progres_logaritma", currentUID), dataToSave);
        } catch (error) {
          console.error("Gagal menyimpan progres: ", error);
        }
      }

      window.resetProgress = () => {
        if (confirm("Yakin ingin mereset progres?")) {
          currentLevel = 0;
          streakCorrect = 0;
          streakWrong = 0;
          totalQuestions = 0;
          totalCorrect = 0;
          totalWrong = 0;
          usedQuestions = [[], [], [], []];
          saveProgress();
          updateUI();
          renderQuestion();
          document.getElementById("feedback").innerText = "Progres di-reset.";
          document.getElementById("level-notification").innerText = "";
        }
      };

      // --------------------------------------------------------
      // LOGIKA KUIS UTAMA (Sama persis dengan kode Anda)
      // --------------------------------------------------------

      function getRandomQuestion() {
        let pool = levels[currentLevel];
        let used = usedQuestions[currentLevel];
        if (used.length >= pool.length) {
          usedQuestions[currentLevel] = [];
          used = usedQuestions[currentLevel];
        }
        let available = pool.filter((qObj) => !used.includes(qObj.q));
        let selected = available[Math.floor(Math.random() * available.length)];
        used.push(selected.q);
        return selected;
      }

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function renderQuestion() {
        currentQ = getRandomQuestion();
        const qContainer = document.getElementById("question-container");
        katex.render(currentQ.q, qContainer, {
          throwOnError: false,
          displayMode: true,
        });

        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";
        let shuffledOptions = shuffleArray([...currentQ.options]);

        shuffledOptions.forEach((opt) => {
          const btn = document.createElement("button");
          btn.className = "option-btn";
          btn.innerText = opt;
          btn.onclick = () => window.checkAnswer(opt, btn);
          optionsContainer.appendChild(btn);
        });

        document.getElementById("feedback").innerText = "";
        document.getElementById("level-notification").innerText = "";
        updateUI();
        saveProgress(); // Simpan saat memuat soal baru
      }

      function updateUI() {
        document.getElementById("level-display").innerText = currentLevel + 1;
        document.getElementById("streak-correct").innerText = streakCorrect;
        document.getElementById("streak-wrong").innerText = streakWrong;
        document.getElementById("total-q").innerText = totalQuestions;
        document.getElementById("total-correct").innerText = totalCorrect;
        document.getElementById("total-wrong").innerText = totalWrong;
      }

      window.checkAnswer = (selected, btnElement) => {
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach((b) => (b.disabled = true));

        const feedback = document.getElementById("feedback");
        const levelNotif = document.getElementById("level-notification");

        totalQuestions++;

        if (selected === currentQ.a) {
          totalCorrect++;
          feedback.innerText = "Benar!";
          feedback.className = "feedback correct";
          streakCorrect++;
          streakWrong = 0;
          if (streakCorrect >= 3) {
            if (currentLevel < levels.length - 1) {
              currentLevel++;
              levelNotif.innerText =
                "🎉 Luar biasa! Anda naik ke Level " + (currentLevel + 1);
            } else {
              levelNotif.innerText =
                "🏆 Anda sangat mahir! Bertahan di Level Tertinggi.";
            }
            streakCorrect = 0;
          }
        } else {
          totalWrong++;
          feedback.innerText = "Salah. Jawaban yang benar: " + currentQ.a;
          feedback.className = "feedback incorrect";
          streakWrong++;
          streakCorrect = 0;
          if (streakWrong >= 2) {
            if (currentLevel > 0) {
              currentLevel--;
              levelNotif.innerText =
                "📉 Coba pelajari lagi. Turun ke Level " + (currentLevel + 1);
            }
            streakWrong = 0;
          }
        }

        updateUI();
        saveProgress(); // Simpan jawaban ke server

        setTimeout(() => {
          renderQuestion();
        }, 2200);
      };
    </script>
  </body>
</html>
