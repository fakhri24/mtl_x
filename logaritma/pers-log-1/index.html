<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuis Interaktif: Persamaan Logaritma Dasar (Final)</title>

    <script>
      MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
          displayMath: [
            ["$$", "$$"],
            ["\\[", "\\]"],
          ],
        },
      };
    </script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f4f8;
        color: #333;
        line-height: 1.6;
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 5px;
      }
      p.subtitle {
        text-align: center;
        color: #7f8c8d;
        margin-bottom: 30px;
      }
      .question-container {
        background-color: #ffffff;
        border-radius: 12px;
        padding: 25px;
        margin-bottom: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        border-left: 6px solid #3498db;
        transition: transform 0.2s;
      }
      .question-text {
        font-size: 1.15em;
        font-weight: 600;
        margin-bottom: 18px;
      }
      .options {
        list-style-type: none;
        padding: 0;
        margin: 0;
      }
      .options li {
        margin-bottom: 12px;
        background-color: #f8f9fa;
        border-radius: 8px;
        border: 2px solid #e9ecef;
        transition: all 0.3s;
      }
      label {
        display: flex;
        align-items: center;
        padding: 12px 15px;
        cursor: pointer;
        width: 100%;
        box-sizing: border-box;
      }
      /* Style Feedback */
      .options li.correct {
        background-color: #d4edda;
        border-color: #28a745;
        color: #155724;
      }
      .options li.incorrect {
        background-color: #f8d7da;
        border-color: #dc3545;
        color: #721c24;
      }
      .options li.disabled {
        pointer-events: none;
      }
      .feedback-text {
        margin-top: 12px;
        font-weight: bold;
        display: none;
      }
      input[type="radio"] {
        margin-right: 15px;
        transform: scale(1.3);
      }
      /* Button Styles */
      .button-group {
        display: flex;
        gap: 15px;
        margin-top: 20px;
        margin-bottom: 50px;
      }
      .btn {
        flex: 1;
        padding: 15px;
        font-size: 1.1em;
        font-weight: bold;
        border-radius: 10px;
        cursor: pointer;
        border: none;
        transition: opacity 0.3s;
      }
      .btn-submit {
        background-color: #2ecc71;
        color: white;
      }
      .btn-reset {
        background-color: #e74c3c;
        color: white;
      }
      .btn:hover {
        opacity: 0.9;
      }

      #result-box {
        display: none;
        background-color: #ffffff;
        border: 2px solid #2ecc71;
        padding: 30px;
        border-radius: 12px;
        text-align: center;
        margin-bottom: 50px;
        box-shadow: 0 10px 20px rgba(46, 204, 113, 0.2);
      }
      .progress-info {
        background-color: #d1ecf1;
        color: #0c5460;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        margin-bottom: 25px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <h1>Latihan Persamaan Logaritma</h1>
    <p class="subtitle">10 Soal Interaktif - Level Dasar & Menengah</p>

    <div class="progress-info">
      ✨ Progres otomatis tersimpan. Klik "Reset Pengerjaan" untuk menghapus
      semua jawaban.
    </div>

    <form id="quiz-form">
      <div id="questions-wrapper"></div>

      <div class="button-group">
        <button
          type="button"
          class="btn btn-submit"
          onclick="calculateFinalScore()"
        >
          Selesai & Lihat Skor
        </button>
        <button type="button" class="btn btn-reset" onclick="resetQuiz()">
          Reset Pengerjaan
        </button>
      </div>
    </form>

    <div id="result-box">
      <h2 id="result-title">Hasil Latihan Kamu</h2>
      <p id="score-text" style="font-size: 1.2em"></p>
      <p>Teruslah berlatih untuk menguasai sifat-sifat logaritma lainnya!</p>
    </div>

    <script>
      const quizData = [
        {
          question: "Tentukan nilai $x$ yang memenuhi $^2\\log x = 5$.",
          options: ["A. 10", "B. 25", "C. 32", "D. 64", "E. 128"],
          answer: 2, // C
        },
        {
          question:
            "Ingat sifat $^a\\log 1 = 0$. Nilai $x$ yang memenuhi persamaan $^3\\log(2x - 5) = 0$ adalah...",
          options: ["A. 2", "B. 3", "C. 4", "D. 5", "E. 6"],
          answer: 1, // B
        },
        {
          question:
            "Himpunan penyelesaian dari $^5\\log(3x - 4) = ^5\\log 11$ adalah...",
          options: ["A. {3}", "B. {4}", "C. {5}", "D. {6}", "E. {7}"],
          answer: 2, // C
        },
        {
          question: "Jika $\\log(2x + 10) = 2$, maka nilai $x$ adalah...",
          options: ["A. 5", "B. 25", "C. 45", "D. 50", "E. 90"],
          answer: 2, // C
        },
        {
          question:
            "Dengan sifat penjumlahan, tentukan $x$ jika $^2\\log x + ^2\\log 5 = ^2\\log 40$.",
          options: ["A. 4", "B. 8", "C. 10", "D. 20", "E. 35"],
          answer: 1, // B
        },
        {
          question:
            "Gunakan sifat pengurangan. Nilai $x$ dari $^3\\log(x+2) - ^3\\log 2 = 1$ adalah...",
          options: ["A. 2", "B. 4", "C. 6", "D. 8", "E. 10"],
          answer: 1, // B
        },
        {
          question:
            "Nilai $x$ yang memenuhi $^{\\frac{1}{3}}\\log(x + 1) = -2$ adalah...",
          options: ["A. 2", "B. 5", "C. 8", "D. 9", "E. 26"],
          answer: 2, // C
        },
        {
          question:
            "Selesaikan persamaan $^2\\log(x^2 - 1) = ^2\\log 8$. Berapakah nilai $x$ positif yang memenuhi?",
          options: ["A. 1", "B. 2", "C. 3", "D. 4", "E. 9"],
          answer: 2, // C
        },
        {
          question:
            "Tentukan $x$ dari persamaan $^4\\log(2x + 6) = ^4\\log(x + 10)$.",
          options: ["A. 2", "B. 4", "C. 6", "D. 8", "E. 16"],
          answer: 1, // B
        },
        {
          question: "Jika $^2\\log x^3 = ^2\\log 64$, maka nilai $x$ adalah...",
          options: ["A. 2", "B. 4", "C. 8", "D. 16", "E. 21"],
          answer: 1, // B
        },
      ];

      const wrapper = document.getElementById("questions-wrapper");

      function renderQuestions() {
        quizData.forEach((item, index) => {
          const questionDiv = document.createElement("div");
          questionDiv.className = "question-container";
          questionDiv.id = `q-container-${index}`;

          let optionsHtml = "";
          item.options.forEach((opt, optIndex) => {
            optionsHtml += `
                        <li id="li-q${index}-o${optIndex}">
                            <label>
                                <input type="radio" name="q${index}" value="${optIndex}" onchange="handleSelection(${index}, ${optIndex})">
                                <span>${opt}</span>
                            </label>
                        </li>
                    `;
          });

          questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${item.question}</div>
                    <ul class="options">
                        ${optionsHtml}
                    </ul>
                    <div class="feedback-text" id="feedback-${index}"></div>
                `;
          wrapper.appendChild(questionDiv);
        });
      }

      function handleSelection(qIndex, selectedValue) {
        checkAndStyleAnswer(qIndex, selectedValue);
        saveProgress();
      }

      function checkAndStyleAnswer(qIndex, selectedValue) {
        const item = quizData[qIndex];
        const isCorrect = parseInt(selectedValue) === item.answer;
        const feedbackDiv = document.getElementById(`feedback-${qIndex}`);

        const radios = document.querySelectorAll(`input[name="q${qIndex}"]`);
        radios.forEach((r) => {
          r.disabled = true;
          document
            .getElementById(`li-q${qIndex}-o${r.value}`)
            .classList.add("disabled");
        });

        const selectedLi = document.getElementById(
          `li-q${qIndex}-o${selectedValue}`,
        );

        if (isCorrect) {
          selectedLi.classList.add("correct");
          feedbackDiv.innerHTML = "✅ Benar!";
          feedbackDiv.style.color = "#28a745";
        } else {
          selectedLi.classList.add("incorrect");
          const correctLi = document.getElementById(
            `li-q${qIndex}-o${item.answer}`,
          );
          correctLi.classList.add("correct");
          feedbackDiv.innerHTML = "❌ Salah. Jawaban benar ditandai hijau.";
          feedbackDiv.style.color = "#dc3545";
        }
        feedbackDiv.style.display = "block";
      }

      function saveProgress() {
        const answers = {};
        quizData.forEach((_, index) => {
          const selected = document.querySelector(
            `input[name="q${index}"]:checked`,
          );
          if (selected) {
            answers[`q${index}`] = selected.value;
          }
        });
        localStorage.setItem("logQuizFinalProgressV2", JSON.stringify(answers));
      }

      function loadProgress() {
        const saved = JSON.parse(
          localStorage.getItem("logQuizFinalProgressV2"),
        );
        if (saved) {
          for (const key in saved) {
            const qIndex = parseInt(key.replace("q", ""));
            const val = saved[key];
            const radio = document.querySelector(
              `input[name="${key}"][value="${val}"]`,
            );
            if (radio) {
              radio.checked = true;
              checkAndStyleAnswer(qIndex, val);
            }
          }
        }
      }

      function calculateFinalScore() {
        let score = 0;
        let answered = 0;
        quizData.forEach((item, index) => {
          const selected = document.querySelector(
            `input[name="q${index}"]:checked`,
          );
          if (selected) {
            answered++;
            if (parseInt(selected.value) === item.answer) score += 10;
          }
        });

        if (answered < 10) {
          alert(
            `Kamu baru menjawab ${answered} soal. Selesaikan semua soal terlebih dahulu!`,
          );
          return;
        }

        const resultBox = document.getElementById("result-box");
        document.getElementById("score-text").innerHTML =
          `Skor Akhir: <b style="font-size:2.5em; color:#2ecc71;">${score}</b> / 100`;
        resultBox.style.display = "block";
        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: "smooth",
        });
      }

      function resetQuiz() {
        if (confirm("Hapus semua jawaban dan mulai dari awal?")) {
          localStorage.removeItem("logQuizFinalProgressV2");
          location.reload();
        }
      }

      renderQuestions();
      loadProgress();
    </script>
  </body>
</html>
