<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan Pertidaksamaan Logaritma (Part 2)</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"
    ></script>

    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f4f7f6;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .quiz-container {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
        text-align: center;
        position: relative;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #2c3e50;
      }
      .score-bar {
        display: flex;
        justify-content: space-around;
        margin-bottom: 15px;
        font-size: 1rem;
        background: #e8f4f8;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #bce8f1;
        font-weight: bold;
      }
      .status-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        font-size: 0.9rem;
        background: #eef2f5;
        padding: 10px;
        border-radius: 8px;
      }
      .question-box {
        font-size: 1.5rem;
        margin: 30px 0;
        min-height: 60px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      button.option-btn {
        background-color: #3498db;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.3s;
      }
      button.option-btn:hover {
        background-color: #2980b9;
      }
      button.option-btn:disabled {
        background-color: #95a5a6;
        cursor: not-allowed;
      }
      .feedback {
        margin-top: 20px;
        font-weight: bold;
        min-height: 24px;
      }
      .correct {
        color: #27ae60;
      }
      .incorrect {
        color: #e74c3c;
      }
      .text-correct {
        color: #27ae60;
      }
      .text-incorrect {
        color: #e74c3c;
      }
      .level-up {
        color: #2980b9;
        font-size: 1.1rem;
        margin-top: 10px;
      }

      .reset-btn {
        background-color: #e74c3c;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 0.9rem;
        cursor: pointer;
        margin-top: 25px;
        transition: background 0.3s;
      }
      .reset-btn:hover {
        background-color: #c0392b;
      }
    </style>
  </head>
  <body>
    <div class="quiz-container">
      <h1>Latihan Pertidaksamaan Logaritma (Part 2)</h1>

      <div class="score-bar">
        <div>Total Soal: <span id="total-q">0</span></div>
        <div class="text-correct">Benar: <span id="total-correct">0</span></div>
        <div class="text-incorrect">Salah: <span id="total-wrong">0</span></div>
      </div>

      <div class="status-bar">
        <div>Level: <strong id="level-display">1</strong>/4</div>
        <div class="text-correct">
          Benar: <strong id="streak-correct">0</strong>/3
        </div>
        <div class="text-incorrect">
          Salah: <strong id="streak-wrong">0</strong>/2
        </div>
      </div>

      <div id="question-container" class="question-box"></div>

      <div class="options" id="options-container"></div>

      <div id="feedback" class="feedback"></div>
      <div id="level-notification" class="level-up"></div>

      <button class="reset-btn" onclick="resetProgress()">
        🔄 Reset Progres
      </button>
    </div>

    <script>
      // Data Soal (Level 1 sampai 4)
      const levels = [
        // LEVEL 1: Pertidaksamaan Dasar
        [
          {
            q: "\\log_2(x-1)<3",
            options: ["1<x<9", "x<9", "x>9", "x>1", "-1<x<9"],
            a: "1<x<9",
          },
          {
            q: "\\log_3(x+2)\\geq 2",
            options: ["x\\geq 7", "x>7", "x\\leq 7", "x<7", "-2<x<7"],
            a: "x\\geq 7",
          },
          {
            q: "\\log_5(x-3)<1",
            options: ["3<x<8", "x<8", "x>8", "x>3", "-3<x<8"],
            a: "3<x<8",
          },
          {
            q: "\\log_4(x+1)\\leq 2",
            options: ["-1<x\\leq 15", "x<15", "x>15", "x>-1", "-1<x<15"],
            a: "-1<x\\leq 15",
          },
          {
            q: "\\log_6(x-2)>0",
            options: ["2<x<3", "x<3", "x>3", "x>2", "-2<x<6"],
            a: "x>3",
          },
          {
            q: "\\log(5-x)\\geq 0",
            options: ["x\\leq 4", "x<4", "x>4", "x>5", "-5<x<4"],
            a: "x\\leq 4",
          },
          {
            q: "\\log_2(x+4)<4",
            options: ["-4<x<12", "x<12", "x>12", "x>-4", "-4<x<16"],
            a: "-4<x<12",
          },
          {
            q: "\\log_3(9-x)\\geq 1",
            options: ["x\\leq 6", "x<6", "x>6", "x>-9", "-9<x<6"],
            a: "x\\leq 6",
          },
          {
            q: "\\log_5(x+1)<0",
            options: ["-1<x<0", "x<0", "x>0", "x>-1", "-1<x<5"],
            a: "-1<x<0",
          },
        ],
        // LEVEL 2: Menggunakan Sifat Penjumlahan & Pengurangan Logaritma
        [
          {
            q: "\\log_2(x)+\\log_2(x-2)<3",
            options: ["2<x<4", "-2<x<4", "x>2", "x>4", "x<2"],
            a: "2<x<4",
          },
          {
            q: "\\log_5(x)+\\log_5(x-4)<1",
            options: ["4<x<5", "x<5", "x>5", "x>4", "-4<x<5"],
            a: "4<x<5",
          },
          {
            q: "\\log_2(x)+\\log_2(x+4)<5",
            options: ["0<x<4", "x<4", "x>0", "x>-8", "-8<x<4"],
            a: "0<x<4",
          },
          {
            q: "\\log(x+3)-\\log(x-1)\\geq 1",
            options: [
              "1<x\\leq \\frac{13}{9}",
              "x\\leq \\frac{13}{9}",
              "x>1",
              "x\\geq \\frac{13}{9}",
              "1<x<\\frac{13}{9}",
            ],
            a: "1<x\\leq \\frac{13}{9}",
          },
          {
            q: "\\log_3(x+2)-\\log_3(x-2)>1",
            options: ["2<x<4", "x<4", "x>2", "x>4", "-2<x<4"],
            a: "2<x<4",
          },
          {
            q: "\\log_2(x+2)-\\log_2(x-1) < 2",
            options: ["x>2", "x>1", "x>-2", "x<2", "1<x<2"],
            a: "x>2",
          },
          {
            q: "\\log_{\\frac{1}{2}}(x-1)+\\log_{\\frac{1}{2}}(x+2)>-2",
            options: ["1<x<2", "x<2", "x>1", "x>-2", "-3<x<2"],
            a: "1<x<2",
          },
          {
            q: "\\log(x-2)+\\log(x-1)\\geq \\log 6",
            options: ["x\\geq 4", "x\\leq -1", "x>2", "x>4", "-1<x\\leq 4"],
            a: "x\\geq 4",
          },
        ],
        // LEVEL 3: Numerus bentuk kuadrat
        [
          {
            q: "\\log_3(x^2-2x)<\\log_3(x+4)",
            options: [
              "-1<x<0 \\text{ atau } 2<x<4",
              "-1<x<0",
              "2<x<4",
              "-1<x<4",
              "-4<x<0 \\text{ atau } x>2",
            ],
            a: "-1<x<0 \\text{ atau } 2<x<4",
          },
          {
            q: "\\log_{0.1}(x^2-x-2)\\leq \\log_{0.1}(x+1)",
            options: [
              "x \\geq 3",
              "x \\leq -1 \\text{ atau } x \\geq 3",
              "x>2",
              "x>3",
              "x \\leq -1",
            ],
            a: "x \\geq 3",
          },
          {
            q: "\\log_9(x^2-x) \\leq \\log_3(x)",
            options: ["x>1", "x>0", "x\\geq 1", "x\\geq 0", "x<0"],
            a: "x>1",
          },
        ],
        // LEVEL 4: Manipulasi Lanjut
        [
          {
            q: "\\log_3\\left(\\frac{2x-1}{x+2}\\right)< 1",
            options: [
              "x<-7 \\text{ atau } x > \\frac{1}{2}",
              "x<-7",
              "x>\\frac{1}{2}",
              "x<-2 \\text{ atau } x > \\frac{1}{2}",
              "-7<x<\\frac{1}{2}",
            ],
            a: "x<-7 \\text{ atau } x > \\frac{1}{2}",
          },
          {
            q: "\\log_{\\frac{1}{3}}\\left(\\frac{x+1}{x-2}\\right) \\geq -1",
            options: [
              "x<-1 \\text{ atau } x \\geq \\frac{7}{2}",
              "x<2 \\text{ atau } x \\geq \\frac{7}{2}",
              "x<-1 \\text{ atau } x > 2",
              "x>2",
              "x\\geq \\frac{7}{2}",
            ],
            a: "x<-1 \\text{ atau } x \\geq \\frac{7}{2}",
          },
          {
            q: "\\log_{\\sqrt{2}}(x-2) \\leq 4",
            options: ["2<x\\leq 6", "x\\leq 6", "x\\leq 4", "x\\geq 2", "x<-2"],
            a: "2<x\\leq 6",
          },
          {
            q: "\\left(\\log_2{x}\\right)^2 - 3(\\log_2{x})+2 < 0",
            options: ["2<x<4", "x<2", "x>4", "x<0 \\text{ atau } x>4", "0<x<2"],
            a: "2<x<4",
          },
          {
            q: "(\\log{x})^2 - \\log{x} - 2 \\leq 0",
            options: [
              "0.1\\leq x \\leq 100",
              "-1\\leq x \\leq 2",
              "x\\leq 0.1 \\text{ atau } x \\geq 100",
              "x\\leq -1 \\text{ atau } x \\geq 2",
              "x\\geq 100",
            ],
            a: "0.1\\leq x \\leq 100",
          },
          {
            q: "(\\log_2{(x-1)})^2 - 5(\\log_2{(x-1)}) + 4 > 0",
            options: [
              "1<x<3 \\text{ atau } x>17",
              "x<1 \\text{ atau } x>4",
              "x<1 \\text{ atau } x>17",
              "1<x<4 \\text{ atau } x>17",
              "x<1 \\text{ atau } 1<x<3 \\text{ atau } x>17",
            ],
            a: "1<x<3 \\text{ atau } x>17",
          },
        ],
      ];

      // Variabel Default
      let currentLevel = 0;
      let streakCorrect = 0;
      let streakWrong = 0;
      let totalQuestions = 0;
      let totalCorrect = 0;
      let totalWrong = 0;
      let usedQuestions = [[], [], [], []]; // Menyimpan string pertanyaan yang sudah dipakai
      let currentQ = null;

      // Load data dari LocalStorage saat halaman dibuka
      function loadProgress() {
        const savedData = localStorage.getItem("pertidaksamaanLogData");
        if (savedData) {
          const data = JSON.parse(savedData);
          currentLevel = data.currentLevel || 0;
          streakCorrect = data.streakCorrect || 0;
          streakWrong = data.streakWrong || 0;
          totalQuestions = data.totalQuestions || 0;
          totalCorrect = data.totalCorrect || 0;
          totalWrong = data.totalWrong || 0;
          usedQuestions = data.usedQuestions || [[], [], [], []];
        }
      }

      // Save data ke LocalStorage
      function saveProgress() {
        const data = {
          currentLevel,
          streakCorrect,
          streakWrong,
          totalQuestions,
          totalCorrect,
          totalWrong,
          usedQuestions,
        };
        localStorage.setItem("pertidaksamaanLogData", JSON.stringify(data));
      }

      // Reset progres manual
      function resetProgress() {
        if (
          confirm("Apakah Anda yakin ingin mereset semua progres kembali ke 0?")
        ) {
          localStorage.removeItem("pertidaksamaanLogData");
          location.reload(); // Muat ulang halaman
        }
      }

      function getRandomQuestion() {
        let pool = levels[currentLevel];
        let used = usedQuestions[currentLevel];

        // Jika semua soal di level ini sudah dipakai, reset daftar yang dipakai
        if (used.length >= pool.length) {
          usedQuestions[currentLevel] = [];
          used = usedQuestions[currentLevel];
        }

        let available = pool.filter((qObj) => !used.includes(qObj.q));
        let randomIndex = Math.floor(Math.random() * available.length);
        let selected = available[randomIndex];

        used.push(selected.q); // Simpan pertanyaan sebagai tanda sudah dipakai
        return selected;
      }

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function renderQuestion() {
        currentQ = getRandomQuestion();

        const qContainer = document.getElementById("question-container");
        katex.render(currentQ.q, qContainer, {
          throwOnError: false,
          displayMode: true,
        });

        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        let shuffledOptions = shuffleArray([...currentQ.options]);

        shuffledOptions.forEach((opt) => {
          const btn = document.createElement("button");
          btn.className = "option-btn";

          // Merender teks opsi menggunakan KaTeX ke dalam tombol
          katex.render(opt, btn, {
            throwOnError: false,
            displayMode: false, // Gunakan false agar dirender sebaris (inline) di dalam tombol
          });

          btn.onclick = () => checkAnswer(opt, btn);
          optionsContainer.appendChild(btn);
        });

        document.getElementById("feedback").innerText = "";
        document.getElementById("level-notification").innerText = "";
        updateUI();
        saveProgress(); // Simpan state terbaru setiap kali soal di-render
      }

      function updateUI() {
        document.getElementById("level-display").innerText = currentLevel + 1;
        document.getElementById("streak-correct").innerText = streakCorrect;
        document.getElementById("streak-wrong").innerText = streakWrong;
        document.getElementById("total-q").innerText = totalQuestions;
        document.getElementById("total-correct").innerText = totalCorrect;
        document.getElementById("total-wrong").innerText = totalWrong;
      }

      function checkAnswer(selected, btnElement) {
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach((b) => (b.disabled = true));

        const feedback = document.getElementById("feedback");
        const levelNotif = document.getElementById("level-notification");

        totalQuestions++;

        if (selected === currentQ.a) {
          totalCorrect++;

          // Merender feedback "Benar!" menggunakan KaTeX
          katex.render("\\text{Benar!}", feedback, {
            throwOnError: false,
            displayMode: false,
          });

          feedback.className = "feedback correct";
          streakCorrect++;
          streakWrong = 0;

          if (streakCorrect >= 3) {
            if (currentLevel < 3) {
              currentLevel++;
              levelNotif.innerText =
                "🎉 Luar biasa! Anda naik ke Level " + (currentLevel + 1);
            } else {
              levelNotif.innerText =
                "🏆 Anda sangat mahir! Bertahan di Level Tertinggi (Level 4).";
            }
            streakCorrect = 0;
          }
        } else {
          totalWrong++;

          // Merender feedback salah dan jawaban yang benar menggunakan KaTeX
          // \text{} digunakan agar tulisan terbaca sebagai teks biasa, sedangkan currentQ.a dirender sebagai matematika
          katex.render(
            "\\text{Salah. Jawaban yang benar: } " + currentQ.a,
            feedback,
            {
              throwOnError: false,
              displayMode: false,
            },
          );

          feedback.className = "feedback incorrect";
          streakWrong++;
          streakCorrect = 0;

          if (streakWrong >= 2) {
            if (currentLevel > 0) {
              currentLevel--;
              levelNotif.innerText =
                "📉 Coba pelajari lagi. Turun ke Level " + (currentLevel + 1);
            }
            streakWrong = 0;
          }
        }

        updateUI();
        saveProgress(); // Simpan progres segera setelah menjawab

        // Jeda sebentar sebelum lanjut soal berikutnya
        setTimeout(() => {
          renderQuestion();
        }, 2200);
      }

      // Inisialisasi saat aplikasi pertama kali dimuat
      window.onload = () => {
        loadProgress();
        renderQuestion();
      };
    </script>
  </body>
</html>
